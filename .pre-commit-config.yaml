repos:
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: build-package
        name: build package
        entry: uv build
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: cli-smoke
        name: cli smoke test
        entry: uv run email-sort --version
        language: system
        pass_filenames: false
        stages: [pre-push]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        additional_dependencies:
          - beautifulsoup4
          - fasttext
          - openai
          - pydantic
          - requests
          - rich
        args: [--ignore-missing-imports, src]
        pass_filenames: false
